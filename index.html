<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noah Shop POS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.topbar{
background:#0f172a;
color:white;
padding:10px;
}

.menu{
background:#1e293b;
color:white;
padding:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.menu button{
background:none;
border:none;
color:white;
font-size:14px;
}

.section{
display:none;
padding:20px;
}

.section.active{
display:block;
}

.stock-low{
color:red;
font-weight:bold;
}

.factura{
background:white;
padding:20px;
border:1px solid #ddd;
width:350px;
}

.watermark{
position:absolute;
opacity:0.1;
font-size:60px;
transform:rotate(-30deg);
}

footer{
text-align:center;
padding:10px;
background:#0f172a;
color:white;
}

</style>

</head>

<body>

<div class="topbar d-flex justify-content-between">

<div>
<h4>🛍 Noah Shop</h4>
Valencia Edo Carabobo | Tel: 0412-8517800
</div>

<div>
POS Profesional
</div>

</div>


<div class="menu">

<button onclick="showSection('ventas')"><i class="fa fa-cash-register"></i> Ventas</button>

<button onclick="showSection('almacen')"><i class="fa fa-box"></i> Almacen</button>

<button onclick="showSection('fiados')"><i class="fa fa-credit-card"></i> Fiados</button>

<button onclick="showSection('clientes')"><i class="fa fa-users"></i> Clientes</button>

<button onclick="showSection('proveedores')"><i class="fa fa-truck"></i> Proveedores</button>

<button onclick="showSection('apartados')"><i class="fa fa-lock"></i> Apartados</button>

<button onclick="showSection('encargos')"><i class="fa fa-clipboard"></i> Encargos</button>

<button onclick="showSection('reportes')"><i class="fa fa-chart-bar"></i> Cierre / Reportes</button>

</div>

<!-- VENTAS -->

<div id="ventas" class="section active">

<h3>Ventas</h3>

<input id="buscarProducto" class="form-control mb-3" placeholder="Buscar producto">

<div id="listaProductos"></div>

<hr>

<h4>Nota de Venta</h4>

<input id="clienteNombre" placeholder="Nombre Cliente" class="form-control mb-2">

<input id="clienteTelefono" placeholder="Whatsapp" class="form-control mb-2">

<input id="direccion" placeholder="Dirección" class="form-control mb-2">

<table class="table">

<thead>

<tr>

<th>Producto</th>
<th>Cant</th>
<th>$</th>
<th>Total</th>
<th></th>

</tr>

</thead>

<tbody id="carrito"></tbody>

</table>

<h4>Total $ <span id="totalVenta">0</span></h4>

<select id="metodoPago" class="form-control mb-2">

<option>Efectivo</option>
<option>Pago Movil</option>
<option>Divisas</option>
<option>Transferencia</option>
<option>Binance</option>
<option>Fiado</option>
<option>Apartado</option>

</select>

<button class="btn btn-success" onclick="finalizarVenta()">Concretar Venta</button>

<button class="btn btn-danger" onclick="anularVenta()">Anular</button>

</div>


<!-- ALMACEN -->

<div id="almacen" class="section">

<h3>Inventario</h3>

<input id="nuevoProducto" placeholder="Producto" class="form-control mb-2">

<input id="precioProducto" placeholder="Precio $" class="form-control mb-2">

<input id="stockProducto" placeholder="Stock" class="form-control mb-2">

<button class="btn btn-primary" onclick="agregarProducto()">Agregar Producto</button>

<hr>

<button class="btn btn-success" onclick="descargarInventario()">Descargar Excel</button>

<div id="inventarioLista"></div>

</div>


<!-- REPORTES -->

<div id="reportes" class="section">

<h3>Reportes</h3>

<canvas id="graficoVentas"></canvas>

<button class="btn btn-success mt-3" onclick="descargarVentas()">Descargar Excel</button>

</div>


<footer>

Sistema POS desarrollado para Noah Shop  
Agradecimientos a Nexus Marketing 04244525765

</footer>


<script>

let productos=JSON.parse(localStorage.getItem("productos"))||[]

let carrito=[]

let ventas=JSON.parse(localStorage.getItem("ventas"))||[]


function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

renderProductos()

renderInventario()

}


function agregarProducto(){

let nombre=document.getElementById("nuevoProducto").value

let precio=parseFloat(document.getElementById("precioProducto").value)

let stock=parseInt(document.getElementById("stockProducto").value)

productos.push({

id:Date.now(),
nombre,
precio,
stock

})

localStorage.setItem("productos",JSON.stringify(productos))

renderInventario()

}


function renderInventario(){

let html=""

productos.forEach(p=>{

html+=`

<div>

${p.nombre} | $${p.precio} | Stock: ${p.stock}

</div>

`

})

document.getElementById("inventarioLista").innerHTML=html

}


function renderProductos(){

let html=""

productos.forEach(p=>{

let alerta=p.stock<=6?"stock-low":""

html+=`

<div class="card p-2 mb-2">

${p.nombre}

Stock <span class="${alerta}">${p.stock}</span>

Precio $${p.precio}

<input id="cant${p.id}" type="number" value="1">

<button onclick="agregarCarrito(${p.id})">Agregar</button>

</div>

`

})

document.getElementById("listaProductos").innerHTML=html

}


function agregarCarrito(id){

let prod=productos.find(p=>p.id==id)

let cant=parseInt(document.getElementById("cant"+id).value)

carrito.push({

...prod,
cant

})

renderCarrito()

}


function renderCarrito(){

let html=""

let total=0

carrito.forEach((p,i)=>{

let subtotal=p.cant*p.precio

total+=subtotal

html+=`

<tr>

<td>${p.nombre}</td>

<td>${p.cant}</td>

<td>${p.precio}</td>

<td>${subtotal}</td>

<td><button onclick="eliminarItem(${i})">X</button></td>

</tr>

`

})

document.getElementById("carrito").innerHTML=html

document.getElementById("totalVenta").innerText=total

}


function eliminarItem(i){

carrito.splice(i,1)

renderCarrito()

}


function anularVenta(){

carrito=[]

renderCarrito()

}


function finalizarVenta(){

let cliente=document.getElementById("clienteNombre").value

let telefono=document.getElementById("clienteTelefono").value

let direccion=document.getElementById("direccion").value

let total=document.getElementById("totalVenta").innerText

let venta={

fecha:new Date(),
cliente,
telefono,
direccion,
carrito,
total

}

ventas.push(venta)

localStorage.setItem("ventas",JSON.stringify(ventas))


carrito.forEach(c=>{

let prod=productos.find(p=>p.id==c.id)

prod.stock-=c.cant

})

localStorage.setItem("productos",JSON.stringify(productos))

generarFactura(venta)

carrito=[]

renderCarrito()

renderProductos()

}


function generarFactura(v){

let div=document.createElement("div")

div.className="factura"

div.innerHTML=`

<img src="https://github.com/jhonmalorne/SistemadeventasNoahShop/blob/main/Noah%20Shop.jpg?raw=true" width="100">

<h4>Noah Shop</h4>

Cliente: ${v.cliente}

Telefono: ${v.telefono}

Direccion: ${v.direccion}

<hr>

${v.carrito.map(p=>`${p.nombre} x${p.cant} $${p.precio}`).join("<br>")}

<hr>

Total $${v.total}

`

document.body.appendChild(div)

html2canvas(div).then(canvas=>{

let img=canvas.toDataURL("image/png")

let url=`https://wa.me/58${v.telefono}?text=Gracias por su compra&media=${img}`

window.open(url)

div.remove()

})

}


function descargarInventario(){

let ws=XLSX.utils.json_to_sheet(productos)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Inventario")

XLSX.writeFile(wb,"inventario_noah_shop.xlsx")

}


function descargarVentas(){

let ws=XLSX.utils.json_to_sheet(ventas)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Ventas")

XLSX.writeFile(wb,"ventas_noah_shop.xlsx")

}


renderProductos()

</script>

</body>
</html>
