<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noah Shop POS</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#f4f6f9;
font-family:system-ui;
}

.topbar{
background:#111827;
color:white;
padding:10px;
display:flex;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

.nav-btn{
margin-right:10px;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
}

.product-card{
border:1px solid #ddd;
padding:10px;
border-radius:8px;
background:white;
}

.low-stock{
color:red;
font-weight:bold;
}

.cart{
background:white;
padding:15px;
border-radius:8px;
}

.footer{
text-align:center;
margin-top:40px;
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo me-4">Noah Shop</div>

<div class="nav-btn" onclick="openSection('ventas')">
<i class="fa fa-cash-register"></i> Ventas
</div>

<div class="nav-btn" onclick="openSection('almacen')">
<i class="fa fa-box"></i> Almacén
</div>

<div class="nav-btn" onclick="openSection('fiados')">
<i class="fa fa-credit-card"></i> Fiados
</div>

<div class="nav-btn" onclick="openSection('reportes')">
<i class="fa fa-chart-bar"></i> Reportes
</div>

<div class="nav-btn" onclick="openSection('clientes')">
<i class="fa fa-users"></i> Clientes
</div>

<div class="nav-btn" onclick="openSection('proveedores')">
<i class="fa fa-truck"></i> Proveedores
</div>

<div class="nav-btn" onclick="openSection('apartados')">
<i class="fa fa-lock"></i> Apartados
</div>

<div class="nav-btn" onclick="openSection('encargos')">
<i class="fa fa-list"></i> Encargos
</div>

<div class="nav-btn" onclick="openSection('inventario')">
<i class="fa fa-warehouse"></i> Inventario
</div>

</div>

<div class="container mt-4">

<div id="ventas" class="section active">

<h3>Ventas</h3>

<input class="form-control mb-3" placeholder="Buscar producto..." onkeyup="buscarProducto(this.value)">

<div id="productos" class="row"></div>

<hr>

<div class="cart">

<h4>Nota de Venta</h4>

<input id="clienteNombre" class="form-control mb-2" placeholder="Nombre del cliente">

<input id="clienteTelefono" class="form-control mb-2" placeholder="WhatsApp">

<input id="vendedor" class="form-control mb-2" placeholder="Nombre vendedor">

<table class="table">

<thead>

<tr>
<th>Producto</th>
<th>Cant</th>
<th>Precio</th>
<th>Total</th>
<th></th>
</tr>

</thead>

<tbody id="cartTable"></tbody>

</table>

<h4>Total $ <span id="totalVenta">0</span></h4>

<button class="btn btn-success" onclick="concretarVenta()">
Concretar Venta
</button>

<button class="btn btn-danger" onclick="anularVenta()">
Anular Venta
</button>

</div>

</div>

<div id="almacen" class="section">

<h3>Almacén</h3>

<input id="prodNombre" class="form-control mb-2" placeholder="Nombre producto">

<input id="prodPrecio" class="form-control mb-2" placeholder="Precio">

<input id="prodStock" class="form-control mb-2" placeholder="Stock">

<button class="btn btn-primary" onclick="agregarProducto()">Agregar Producto</button>

<hr>

<table class="table">

<thead>

<tr>
<th>Código</th>
<th>Producto</th>
<th>Stock</th>
<th>Precio</th>
</tr>

</thead>

<tbody id="tablaAlmacen"></tbody>

</table>

</div>

<div id="reportes" class="section">

<h3>Reportes</h3>

<canvas id="graficoVentas"></canvas>

<button class="btn btn-success mt-3" onclick="descargarExcel()">
Descargar Excel
</button>

</div>

</div>

<div class="footer">

Agradecimientos a Nexus Marketing  
04244525765

</div>

<script>

let productos=JSON.parse(localStorage.getItem("productos"))||[]
let ventas=JSON.parse(localStorage.getItem("ventas"))||[]
let carrito=[]

function guardar(){
localStorage.setItem("productos",JSON.stringify(productos))
localStorage.setItem("ventas",JSON.stringify(ventas))
}

function openSection(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function agregarProducto(){

let nombre=document.getElementById("prodNombre").value
let precio=parseFloat(document.getElementById("prodPrecio").value)
let stock=parseInt(document.getElementById("prodStock").value)

let codigo="P"+Date.now()

productos.push({codigo,nombre,precio,stock})

guardar()

renderProductos()
renderAlmacen()

}

function renderProductos(){

let cont=document.getElementById("productos")

cont.innerHTML=""

productos.forEach(p=>{

let alerta=p.stock<=6?"low-stock":""

cont.innerHTML+=`

<div class="col-md-3">

<div class="product-card">

<h5>${p.nombre}</h5>

<p class="${alerta}">Stock: ${p.stock}</p>

<p>$ ${p.precio}</p>

<input type="number" id="cant-${p.codigo}" class="form-control mb-2" placeholder="Cantidad">

<button class="btn btn-primary" onclick="agregarCarrito('${p.codigo}')">

Agregar

</button>

</div>

</div>

`

})

}

function renderAlmacen(){

let t=document.getElementById("tablaAlmacen")

t.innerHTML=""

productos.forEach(p=>{

t.innerHTML+=`

<tr>

<td>${p.codigo}</td>
<td>${p.nombre}</td>
<td>${p.stock}</td>
<td>$${p.precio}</td>

</tr>

`

})

}

function agregarCarrito(codigo){

let cant=parseInt(document.getElementById("cant-"+codigo).value)

let p=productos.find(x=>x.codigo==codigo)

carrito.push({...p,cant})

renderCart()

}

function renderCart(){

let t=document.getElementById("cartTable")

t.innerHTML=""

let total=0

carrito.forEach((c,i)=>{

let sub=c.precio*c.cant

total+=sub

t.innerHTML+=`

<tr>

<td>${c.nombre}</td>

<td>${c.cant}</td>

<td>${c.precio}</td>

<td>${sub}</td>

<td>

<button onclick="eliminarItem(${i})">X</button>

</td>

</tr>

`

})

document.getElementById("totalVenta").innerText=total

}

function eliminarItem(i){

carrito.splice(i,1)

renderCart()

}

function anularVenta(){

carrito=[]

renderCart()

}

function concretarVenta(){

let cliente=document.getElementById("clienteNombre").value

let tel=document.getElementById("clienteTelefono").value

let vendedor=document.getElementById("vendedor").value

let total=0

carrito.forEach(c=>{

let p=productos.find(x=>x.codigo==c.codigo)

p.stock-=c.cant

total+=c.cant*c.precio

})

let venta={
fecha:new Date(),
cliente,
tel,
vendedor,
items:carrito,
total
}

ventas.push(venta)

guardar()

carrito=[]

renderCart()
renderProductos()
renderAlmacen()

alert("Venta registrada")

}

function descargarExcel(){

let ws=XLSX.utils.json_to_sheet(ventas)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Ventas")

XLSX.writeFile(wb,"ventas_noahshop.xlsx")

}

renderProductos()
renderAlmacen()

</script>

</body>
</html>
